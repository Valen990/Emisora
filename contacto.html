<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="manifest" href="./img/manifest.json">
    <link rel="icon" href="/img/logo.jpeg">
    <link rel="stylesheet" href="css/contacto.css">
</head>

<body>
    <main-navbar></main-navbar>
    <section class="contact-section container my-5">
    <div class="row g-5">
        <div class="col-lg-7">
            <h2 class="mb-4" style="text-align: center;">Contáctanos</h2>

            <form>
                <div class="row g-3">
                    <div class="col-md-6">
                        <input type="text" class="form-control" placeholder="Nombre completo" required style="background-color: #E3A2E6;">
                    </div>

                    <div class="col-md-6">
                        <input type="email" class="form-control" placeholder="Correo electrónico" required style="background-color: #E3A2E6;">
                    </div>

                    <div class="col-12">
                        <input type="text" class="form-control" placeholder="Asunto" style="background-color: #E3A2E6;">
                    </div>

                    <div class="col-12">
                        <textarea class="form-control" rows="5" placeholder="Escribe tu mensaje..." style="background-color: #E3A2E6;"></textarea>
                    </div>

                    <div class="col-12 text-center">
                        <button type="submit" class="btn btn-primary px-4" style="background-color: #7C2281; border-color: #7C2281; font-weight: bold;">
                            Enviar mensaje
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <!-- Info de contacto -->
        <div class="col-lg-5">
            <div class="contact-info p-4 shadow-sm">

                <h4 class="mb-4" style="color: #F9EBFA; text-align: center;">Información</h4>

                <p><i class="fa-solid fa-location-dot me-2"></i> Medellín, Colombia</p>

                <p><i class="fa-solid fa-phone me-2"></i> +57 300 123 4567</p>

                <p><i class="fa-solid fa-envelope me-2"></i> contacto@emisora.com</p>

                <hr>

                <h5>Síguenos</h5>
                <div class="d-flex gap-3 mt-3" style="justify-content: center;">
                    <i class="fa-brands fa-facebook fa-lg"></i>
                    <i class="fa-brands fa-instagram fa-lg"></i>
                    <i class="fa-brands fa-x-twitter fa-lg"></i>
                </div>

            </div>
        </div>

    </div>
</section>

    <main-footer></main-footer>
    <script src="/components/navbar-component.js"></script>
    <script src="./js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>

    <!-- Script script para el footer -->
    <script src="./components/footer-component.js"></script>
    <!-- Script de los iconos del footer -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>

</html>
