<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="icon" href="/img/logo.jpeg">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            color: rgb(58, 36, 55);
        }

    </style>

    <main-navbar></main-navbar>

    <div class="container">
        <div class="form-container">
            <div class="form-header">
                <p>Ingrese su informacion</p>
                <h1>¡Bienvenido de vuelta!</h1>
            </div>
            <form class="form-box" action="index.html">
                <a href="login.html"></a>
                <div class="input-group">
                    <input type="email" id="email" class="input-field" placeholder="Email" required>
                    <label for="email" class="floating-label">Correo Electronico</label>
                </div>
                <div class="input-group">
                    <input type="password" id="password" class="input-field" placeholder="Contraseña" required>
                    <label for="password" class="floating-label">Contraseña</label>
                    <div class="eye-icon" onclick="controlarContraseña()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-icon lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                    </div>
                </div>
                <div class="input-group checkbox-group">
                    <div class="form-col remember-me">
                        <input type="checkbox" id="remember-me-checkbox" class="checkbox-field">
                        <label for="remember-me-checkbox">Recuerdame</label>
                    </div>
                    <div class="form-col">
                        <a href="#" class="form-link">¿Olvidates tu contraseña?</a>
                    </div>
                </div>
                <button type="submit" class="form-btn form-btn--submit">Iniciar sesion</button>
            </form>
            <div class="form-divider">
                <p>O</p>
            </div>
            <div class="form-botton">
                <div class="form-google">
                    <button class="form-btn form-btn--social">
                        <img src="img/icons8-logo-de-google-50.svg" class="btn-icon" alt="google icon">
                    </button>
                </div>
                <p>¿Todavia no tienes una cuenta? <a href="#" class="form-link">Registrate</a></p>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>

    <!-- Script del navbar -->
    <script src="/components/navbar-component.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
